<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>damaskdi?</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Montserrat',sans-serif;color:white;height:100vh;overflow:hidden;cursor:default;position:relative;}

/* Background Video */
#bgVideo{
    position:fixed;
    top:0; left:0;
    width:100%; height:100%;
    object-fit:cover;
    z-index:-2;
    animation: zoomBg 20s infinite alternate ease-in-out;
}
@keyframes zoomBg{from{transform:scale(1);}to{transform:scale(1.08);}}

/* Overlay for subtle darkness */
.overlay{
    position:fixed;
    width:100%; height:100%;
    background:rgba(0,0,0,0.4);
    z-index:-1;
}

/* Center content */
.container{
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
    padding:20px;
}

/* Transparent ANDROS text with subtle outline */
h1{
    font-size:clamp(40px,15vw,100px);
    font-weight:700;
    color:rgba(255,255,255,0.12);
    -webkit-text-stroke:1px rgba(255,255,255,0.2);
    letter-spacing:10px;
    margin-bottom:20px;
    pointer-events:none;
    text-shadow: 0 0 20px rgba(255,0,200,0.2);
}

/* Floating links */
.links{
    display:flex;
    flex-direction:column;
    gap:20px;
    z-index:1;
}

.link{
    padding:16px 25px;
    text-decoration:none;
    color:white;
    font-weight:600;
    letter-spacing:1px;
    border-radius:12px;
    background:rgba(255,255,255,0.08);
    overflow:hidden;
    position:relative;
    transition:0.25s ease, transform 0.25s ease;
}
.link::after{
    content:"";
    position:absolute;
    bottom:0; left:0;
    height:3px;
    width:0%;
    background:linear-gradient(90deg,#ff00c8,#6a00ff);
    transition:width 0.4s ease;
}
.link:hover{
    background:rgba(255,255,255,0.18);
    transform:translateY(-3px) scale(1.03);
}
.link:hover::after{width:100%;}

/* Music Button */
.music-btn{
    position:fixed;
    bottom:30px;
    right:30px;
    background:rgba(0,0,0,0.5);
    border:none;
    padding:12px 18px;
    color:white;
    font-weight:600;
    border-radius:25px;
    cursor:pointer;
    box-shadow:0 0 15px rgba(255,0,200,0.5);
    transition:0.3s;
    z-index:2;
}
.music-btn:hover{
    background:rgba(255,255,255,0.15);
    transform:scale(1.05);
}

/* Fade-in animations for links */
.link, .bio{
    opacity:0;
    transform:translateY(30px);
    animation:fadeUp 1s ease forwards;
}
.link:nth-child(1){animation-delay:0.5s;}
.link:nth-child(2){animation-delay:0.7s;}
.link:nth-child(3){animation-delay:0.9s;}
@keyframes fadeUp{
    to{opacity:1; transform:translateY(0);}
}

.bio{
    margin-bottom:40px;
    font-size:clamp(14px,4vw,18px);
    animation-delay:0.3s;
}

@media(max-width:480px){
  h1{
    font-size:clamp(40px,12vw,1100px);
    letter-spacing:6px;
  }
}
</style>
</head>
<body>

<video id="bgVideo" autoplay muted loop>
    <source src="bg.mp4" type="video/mp4">
</video>
<div class="overlay"></div>

<div class="container">
    <h1>Omanchikk :DD</h1>
    <div class="bio">Developer • Hot. • Klasni</div>

    <div class="links">
        <a href="https://discord.com/users/895226812530065418" class="link" target="_blank">Discord</a>
        <a href="https://www.instagram.com/andriaomanadzee/" class="link" target="_blank">Instagram</a>
        <a href="https://androstools.vercel.app/" class="link" target="_blank">Tools Website</a>
    </div>
</div>

<button class="music-btn" id="musicBtn">Turn On Sound 🔊</button>

<script>
const video = document.getElementById("bgVideo");
const musicBtn = document.getElementById("musicBtn");

// Enable video sound on first click or hover (desktop)
function enableVideoSound(){
    if(video.muted){
        video.muted = false;
        video.play();
        musicBtn.style.display = "none"; // hide button after turning on
    }
}

// Click button explicitly
musicBtn.addEventListener("click", enableVideoSound);

// Hover on video (desktop only)
video.addEventListener("mouseenter", enableVideoSound);
</script>

</body>
</html>
